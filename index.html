<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Ceramics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">Five Ceramics</a>
      <div class="nav-links">
        <div class="nav-dropdown">
          <a href="shop/all.html">Shop</a>
          <div class="nav-dropdown-menu">
            <a href="shop/all.html">All</a>
            <a href="shop/all.html#lighting">Lighting</a>
            <a href="shop/all.html#tableware">Tableware</a>
            <a href="shop/all.html#interiors">Interiors</a>
          </div>
        </div>
        <a href="about.html">About</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-image">
      <!-- Replace with: <img src="images/hero.jpg" alt="Five Ceramics hero"> -->
      <span class="hero-placeholder">Hero Image</span>
    </div>
    <div class="hero-overlay">
      <h1>Five Ceramics</h1>
      <p>Architectural ceramics, handcrafted with intention</p>
    </div>
  </section>

  <section class="featured">
    <div class="container">
      <p class="section-subtitle">Selected Works</p>
      <h2>Featured</h2>
      <div class="product-grid" id="featured-grid">
        <!-- Rendered by JS from products.json -->
      </div>
      <div class="featured-cta">
        <a href="shop/all.html" class="btn">View Collection</a>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-left">
          <p>&copy; 2026 Five Ceramics. All rights reserved.</p>
        </div>
        <div class="footer-right">
          <a href="mailto:hello@fiveceramics.com">Contact</a>
          <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="data/products.js"></script>
  <script>
    (function() {
      var products = window.PRODUCTS || [];
      var featured = products.filter(function(p) { return p.featured; });
      var grid = document.getElementById('featured-grid');
      var html = '';
      featured.forEach(function(p) {
        var img = p.images && p.images.length
          ? '<img src="' + p.images[0] + '" alt="' + p.name + '">'
          : '<span class="placeholder-text">Photo</span>';
        html += '<a href="shop/product.html?slug=' + p.slug + '" class="product-card">'
          + '<div class="product-card-image">' + img + '</div>'
          + '<h3>' + p.name + '</h3>'
          + '<p class="price">' + p.price + '</p>'
          + '</a>';
      });
      grid.innerHTML = html;
    })();
  </script>
</body>
</html>
