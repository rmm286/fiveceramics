  <meta property="og:title" content="Shop - Five Ceramics">
  <meta property="og:description" content="Shop the complete Five Ceramics collection, including handcrafted lighting, tableware, and interiors.">
  <meta property="og:url" content="https://fiveceramics.com/shop/all.html">
  <meta property="og:image" content="https://fiveceramics.com/images/rodsbod_sconce_interior_land.png">
  <meta property="og:image:alt" content="Five Ceramics collection preview image">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shop - Five Ceramics">
  <meta name="twitter:description" content="Shop the complete Five Ceramics collection, including handcrafted lighting, tableware, and interiors.">
  <meta name="twitter:image" content="https://fiveceramics.com/images/rodsbod_sconce_interior_land.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a href="../index.html" class="nav-logo">Five Ceramics</a>
      <div class="nav-links">
        <div class="nav-dropdown">
          <a href="all.html">Shop</a>
          <div class="nav-dropdown-menu">
            <a href="all.html">All</a>
            <a href="all.html#lighting">Lighting</a>
            <a href="all.html#tableware">Tableware</a>
            <a href="all.html#interiors">Interiors</a>
          </div>
        </div>
        <a href="../about.html">About</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <div class="page-banner">
    <div class="container">
      <h1>Shop</h1>
      <p>The complete collection — lighting, tableware, and interiors.</p>
    </div>
  </div>

  <section>
    <div class="container" id="shop-content">
      <!-- Rendered by JS from products.js -->
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-left">
          <p>&copy; 2026 Five Ceramics. All rights reserved.</p>
        </div>
        <div class="footer-right">
          <a href="mailto:hello@fiveceramics.com">Contact</a>
          <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../data/products.js"></script>
  <script>
    (function() {
      var products = window.PRODUCTS || [];
      var CATEGORIES = ['lighting', 'tableware', 'interiors'];
      var LABELS = { lighting: 'Lighting', tableware: 'Tableware', interiors: 'Interiors' };
      var container = document.getElementById('shop-content');
      var html = '';

      CATEGORIES.forEach(function(cat, i) {
        var items = products.filter(function(p) { return p.category === cat && p.images && p.images.length > 0; });
        if (!items.length) return;
        var mb = i < CATEGORIES.length - 1 ? ' style="margin-bottom:4rem"' : '';
        html += '<h2 id="' + cat + '" class="shop-section-heading">' + LABELS[cat] + '</h2>';
        html += '<div class="product-grid"' + mb + '>';
        items.forEach(function(p) {
          var img = p.images && p.images.length
            ? '<img src="../' + p.images[0] + '" alt="' + p.name + '">'
            : '<span class="placeholder-text">Photo</span>';
          html += '<a href="product.html?slug=' + p.slug + '" class="product-card">'
            + '<div class="product-card-image">' + img + '</div>'
            + '<h3>' + p.name + '</h3>'
            + '<p class="price">' + p.price + '</p>'
            + '</a>';
        });
        html += '</div>';
      });

      container.innerHTML = html;
    })();
  </script>
</body>
</html>
