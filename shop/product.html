<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Ceramics</title>
  <meta name="description" content="Discover handcrafted ceramic pieces by Five Ceramics.">
  <meta property="og:type" content="product">
  <meta property="og:site_name" content="Five Ceramics">
  <meta property="og:title" content="Five Ceramics">
  <meta property="og:description" content="Discover handcrafted ceramic pieces by Five Ceramics.">
  <meta property="og:url" content="https://fiveceramics.com/shop/product.html">
  <meta property="og:image" content="https://fiveceramics.com/images/rodsbod_sconce_interior_land.png">
  <meta property="og:image:alt" content="Five Ceramics product preview image">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Five Ceramics">
  <meta name="twitter:description" content="Discover handcrafted ceramic pieces by Five Ceramics.">
  <meta name="twitter:image" content="https://fiveceramics.com/images/rodsbod_sconce_interior_land.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a href="../index.html" class="nav-logo">Five Ceramics</a>
      <div class="nav-links">
        <div class="nav-dropdown">
          <a href="all.html">Shop</a>
          <div class="nav-dropdown-menu">
            <a href="all.html">All</a>
            <a href="all.html#lighting">Lighting</a>
            <a href="all.html#tableware">Tableware</a>
            <a href="all.html#interiors">Interiors</a>
          </div>
        </div>
        <a href="../about.html">About</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <section>
    <div class="container" id="product-content">
      <!-- Rendered by JS from products.js -->
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-left">
          <p>&copy; 2026 Five Ceramics. All rights reserved.</p>
        </div>
        <div class="footer-right">
          <a href="mailto:hello@fiveceramics.com">Contact</a>
          <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../data/products.js"></script>
  <script>
    (function() {
      function upsertMeta(selector, attr, value) {
        var tag = document.querySelector(selector);
        if (!tag) {
          tag = document.createElement('meta');
          var key = selector.indexOf('property=') !== -1 ? 'property' : 'name';
          var match = selector.match(/["']([^"']+)["']/);
          if (match && match[1]) tag.setAttribute(key, match[1]);
          document.head.appendChild(tag);
        }
        tag.setAttribute(attr, value);
      }

      function toAbsoluteUrl(path) {
        if (!path) return '';
        return new URL('../' + path, window.location.href).href;
      }

      function setSocialPreview(product) {
        var title = product.name + ' - Five Ceramics';
        var description = product.description || 'Discover handcrafted ceramic pieces by Five Ceramics.';
        var image = product.images && product.images.length ? toAbsoluteUrl(product.images[0]) : '';
        var pageUrl = new URL(window.location.href);
        pageUrl.searchParams.set('slug', product.slug);

        document.title = title;
        upsertMeta('meta[name="description"]', 'content', description);
        upsertMeta('meta[property="og:type"]', 'content', 'product');
        upsertMeta('meta[property="og:title"]', 'content', title);
        upsertMeta('meta[property="og:description"]', 'content', description);
        upsertMeta('meta[property="og:url"]', 'content', pageUrl.toString());
        upsertMeta('meta[property="og:image"]', 'content', image);
        upsertMeta('meta[property="og:image:alt"]', 'content', product.name + ' by Five Ceramics');
        upsertMeta('meta[name="twitter:card"]', 'content', 'summary_large_image');
        upsertMeta('meta[name="twitter:title"]', 'content', title);
        upsertMeta('meta[name="twitter:description"]', 'content', description);
        upsertMeta('meta[name="twitter:image"]', 'content', image);
      }

      var LABELS = { lighting: 'Lighting', tableware: 'Tableware', interiors: 'Interiors' };
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      if (!slug) { window.location.href = 'all.html'; return; }

      var products = window.PRODUCTS || [];
      var p = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].slug === slug) { p = products[i]; break; }
      }

      var container = document.getElementById('product-content');

      if (!p) {
        container.innerHTML = '<div class="page-banner" style="padding-top:140px">'
          + '<h1>Product Not Found</h1><p style="margin:1rem auto"><a href="all.html">Back to Shop</a></p></div>';
        return;
      }

      setSocialPreview(p);
      var catLabel = LABELS[p.category] || p.category;

      var mainImg = p.images && p.images.length
        ? '<img src="../' + p.images[0] + '" alt="' + p.name + '">'
        : '<span class="hero-placeholder">Product Image</span>';

      var thumbs = '';
      if (p.images && p.images.length > 1) {
        thumbs = '<div class="product-detail-thumbs">';
        p.images.forEach(function(src, idx) {
          thumbs += '<div class="product-detail-thumb" data-index="' + idx + '">'
            + '<img src="../' + src + '" alt="Thumbnail" onerror="this.outerHTML=\'Photo ' + (idx + 1) + '\'">'
            + '</div>';
        });
        thumbs += '</div>';
      }

      var dimRows = '';
      if (p.dimensions) {
        var keys = Object.keys(p.dimensions);
        keys.forEach(function(key) {
          dimRows += '<tr><td>' + key + '</td><td>' + p.dimensions[key] + '</td></tr>';
        });
      }

      var html = '<div class="product-detail">'
        + '<div class="product-detail-images">'
        +   '<div class="product-detail-image" id="main-image">' + mainImg + '</div>'
        +   thumbs
        + '</div>'
        + '<div class="product-detail-info">'
        +   '<p class="product-breadcrumb">Shop &nbsp;|&nbsp; ' + catLabel + '</p>'
        +   '<h1>' + p.name + '</h1>'
        +   '<p class="product-detail-price">' + p.price + '</p>'
        +   '<p class="product-detail-description">' + p.description + '</p>'
        +   '<p class="product-detail-availability">' + (p.availability || '') + '</p>'
        +   '<details class="product-accordion">'
        +     '<summary>Dimensions</summary>'
        +     '<div class="product-accordion-content">'
        +       '<table><thead><tr><th>Measurement</th><th>Value</th></tr></thead>'
        +       '<tbody>' + dimRows + '</tbody></table>'
        +     '</div>'
        +   '</details>'
        +   '<details class="product-accordion">'
        +     '<summary>Shipping</summary>'
        +     '<div class="product-accordion-content"><p>' + (p.shipping || '') + '</p></div>'
        +   '</details>'
        +   '<details class="product-accordion">'
        +     '<summary>Care</summary>'
        +     '<div class="product-accordion-content"><p>' + (p.care || '') + '</p></div>'
        +   '</details>'
        +   '<a href="all.html#' + p.category + '" class="product-back-link">&larr; Back to Shop</a>'
        + '</div>'
        + '</div>';

      container.innerHTML = html;

      var thumbEls = document.querySelectorAll('.product-detail-thumb');
      thumbEls.forEach(function(thumb) {
        thumb.addEventListener('click', function() {
          var idx = parseInt(thumb.getAttribute('data-index'));
          var src = p.images[idx];
          if (src) {
            document.getElementById('main-image').innerHTML =
              '<img src="../' + src + '" alt="' + p.name + '">';
          }
        });
      });
    })();
  </script>
</body>
</html>
